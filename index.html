<!--
	A game made by Aarex without prestige and prestige layers.
-->
<head>
	<title id="title">Ranks - Incremental Game</title>
	<link rel="icon" href="img/points.png">

	<link href='https://fonts.googleapis.com/css?family=Lexend' rel='stylesheet'>
	<link rel="stylesheet" type="text/css" href="styles/styles.css">
    <link rel="icon" href="img/favicon.png">

	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://aarextiaokhiao.github.io/Ranks/"/>
	<meta property="og:title" content="Ranks - Incremental Game"/>
	<meta property="og:image" content="https://aarextiaokhiao.github.io/Ranks/img/favicon.png"/>
    <meta property="og:description" content="Progress yourself to unlock new content! How far can you go?"/>

	<script type="text/javascript" src="js/display.js"></script>
	<script type="text/javascript" src="js/game.js"></script>
	<script type="text/javascript" src="js/format.js"></script>
	<script type="text/javascript" src="js/setup.js"></script>
	<script type="text/javascript" src="js/temp.js"></script>
</head>
<body onload='setup()'>
	<div id="bg"></div>
	<div id="bottom">
		<div id='numberSmall'></div>
		<div id='rank'></div>
	</div>

	<div class='upgrades' id='tabs' style='width:100%'>
		<button class='wideButton' onclick='switchTab("main")'>
			<img src="img/tabs/main.png">
			Main
		</button>
		<button id='tabmoneybutton' class='wideButton' onclick='switchTab("money")' style='display:none'>
			<img src="img/tabs/money.png">
			Money
		</button>
		<button class='wideButton' onclick='switchTab("options")'>Options</button>
		<button class='wideButton' onclick='switchTab("stats")'>Stats</button>
		<button class='wideButton' onclick='switchTab("about")'>About</button>
	</div>
	<div style='width: 100%'>
		<div id='tabmain'>
			<div id="number"></div>
			<div style='position: absolute; width:100%; top: 60%'>
				<!-- MULTIPLIERS -->
				<div class='upgrades'>
					<button id='mult1' class='bigButton' style='display:none' onclick='buyMult(1)'></button>
					<button id='mult2' class='bigButton' style='display:none' onclick='buyMult(2)'></button>
					<button id='mult3' class='bigButton' style='display:none' onclick='buyMult(3)'></button>
				</div>

				<!-- SACRIFICE -->
				<div id="sacsection" style='display:none'>
					<br><br>
					<h3 id="sacTime"></h3>
					<div class='upgrades'>
						<button id="sacBtn" class='bigButton' onclick="sacrifice()"></button>
						<button class='bigButton' onclick="timewarp()">Use +60s</button>
					</div>
				</div>
			</div>
		</div>
		<div id='taboptions' style='display:none'>
			<div class='upgrades'>
				<button class='bigButton' onClick='save()'>Save</button>
				<button class='bigButton' onClick='exportSave()'>Export</button>
				<button class='bigButton' onClick='importSave()'>Import</button>
				<button class='bigButton' onClick='reset()'>Reset</button>
				<button id='notation' class='bigButton' onClick='switchNotation()'></button>
			</div>
			<div id='exportSave' style='display:none'>Here is your export save. Enjoy! <input id='exportText' style='width: 480px'></input></div>
		</div>
		<div id='tabstats' style='display:none'>
			<div id='timePlayed'></div>
			<div id='totalNumber'></div>
			<div id='timeRank'></div>
			<div id='fuelWasted'></div>
		</div>
		<div id='tabmoney' style='display:none'>
			<h1 id='money'></h1>
			<div class='upgrades'>
				<button id='exchange1' class='bigButton' onClick='exchange(1)'></button>
				<button id='exchange2' class='bigButton' onClick='exchange(2)'></button>
				<button class='bigButton' onClick='exchange(3)'>Exchange 50% of number to money</button>
				<button class='bigButton' onClick='exchange(4)'>Exchange 50% of money to number</button>
			</div>

			<br>
			<div id='moneyMult'></div>
			<div class='upgrades'>
				<button id='gen1' class='bigButton' onClick='buyMoney(0)'></button>
				<button id='gen2' class='bigButton' onClick='buyMoney(1)'></button>
				<button id='gen3' class='bigButton' onClick='buyMoney(2)'></button>
			</div>

			<br>
			<div id='coalsection'><div id='coal'></div>
			<div id='genpower'></div>
			<div id='fuel'></div>
			<button class='bigButton' onClick='exchange(5)'>Exchange $5 to 1 coal</button>
			<button class='bigButton' onClick='exchange(6)'>Exchange 1 coal to $4</button>
			<button class='bigButton' onClick='exchange(7)'>Turn coal to fuel</button>
			<br>
			<div id='upgsection'><button id='genpowerUpg' class='bigButton' onClick='buyMoney(3)'>Upgrade gen power<br>2x<br>Cost: $1</button>
			<button id='fuelUpg' class='bigButton' onClick='buyMoney(4)'>Increase fuel efficient<br>1x<br>Cost: $1</button></div></div>
		</div>
		<div id='tababout' style='display:none'>
			<h1>Ranks: v1.02</h1>
			<h2>Welcome back</h2>
			Ranks is a game where you must rank up for content.

			<br><br>
			<a href='changelog.html' target="_newtab">Change log</a> | <a href="http://aarextiaokhiao.github.io/chat.html">Discord</s> | <a href="http://aarextiaokhiao.github.io">Home</a>
		</div>
	</div>
</body>
